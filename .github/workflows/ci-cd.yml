name: ci-cd

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read
  packages: write
  
jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Restore API packages
        run: dotnet restore API/API.csproj

      - name: Build API
        run: dotnet build API/API.csproj --configuration Release --no-restore

      - name: Test API
        run: dotnet test spk.slnx --configuration Release --no-build

      - name: Install client dependencies
        working-directory: Client
        run: npm install

      - name: Lint client
        working-directory: Client
        run: npm run lint

      - name: Build client
        working-directory: Client
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API Docker image
        run: |
         docker build \
         -f API/Dockerfile \
         -t ghcr.io/${{ github.repository_owner }}/spk-akademi-api:${{ github.sha }} \
         -t ghcr.io/${{ github.repository_owner }}/spk-akademi-api:latest \.

      - name: Build frontend Docker image
        run: docker build -f Client/Dockerfile -t spk-frontend:${{ github.sha }} .

