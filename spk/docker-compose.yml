services:
  db:
    image: postgres:17-alpine
    container_name: spk-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spk_prod}
      POSTGRES_USER: ${POSTGRES_USER:-spk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spk} -d ${POSTGRES_DB:-spk_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: API/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: spk-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      Database__Provider: ${Database__Provider:-Postgres}
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection:?ConnectionStrings__DefaultConnection is required}
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      AllowedHosts: ${AllowedHosts:?AllowedHosts is required}
      Cors__AllowedOrigins__0: ${Cors__AllowedOrigins__0:-http://localhost}
      Cors__AllowedOrigins__1: ${Cors__AllowedOrigins__1:-https://localhost}
      Seo__PublicBaseUrl: ${Seo__PublicBaseUrl:-http://localhost}
      Email__Enabled: ${Email__Enabled:-false}
      DataProtection__KeysPath: /keys
      Serilog__WriteTo__1__Args__path: /logs/spk-.log
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - ./storage/uploads:/app/wwwroot/uploads
      - ./storage/imports:/app/imports
      - ./storage/logs:/logs
      - ./storage/data-protection:/keys

  frontend:
    build:
      context: .
      dockerfile: Client/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: spk-frontend
    expose:
      - "80"

  nginx:
    image: nginx:1.29-alpine
    container_name: spk-nginx
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
